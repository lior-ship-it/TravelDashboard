<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluespine Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #070d22;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 500px;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #e8a020;
  }
  p {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .info {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
  }
  .info h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
  }
  code {
    background: rgba(0,0,0,0.3);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    color: #3d8ef0;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Bluespine Dashboard</h1>
    <p>
      This is the Bluespine Recoupment Dashboard API server.
      Access to dashboards requires a tenant-specific link provided by your administrator.
    </p>

    <div class="info">
      <h2>For Administrators</h2>
      <p style="font-size:14px; text-align:left;">
        Generate tenant access links using:
      </p>
      <code>node tools/generate-link.js &lt;tenant&gt;</code>
    </div>
  </div>
</body>
</html>
